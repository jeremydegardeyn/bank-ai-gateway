# Bank AI Gateway — model tiers, routing, budgets, and PII policy.
# GCP identifiers (project, region, Model Armor template) come from env vars — see .env.example.

tiers:
  standard:
    provider: gemini
    model: gemini-2.5-flash
    max_output_tokens: 1024
    # Vertex pay-per-token; pennies per demo session.
  premium:
    provider: gemini
    model: gemini-2.5-pro
    max_output_tokens: 2048
    # Swap to Claude on Vertex once the model's quota is granted:
    #   provider: claude
    #   model: claude-opus-4-8
    # (Enable in Model Garden AND request base-model quota — defaults to 0.)

routing:
  # Requests route to standard unless the UI pins a tier or these heuristics fire.
  premium_keywords:
    - "analyze"
    - "compare"
    - "strategy"
    - "risk assessment"
    - "regulation"
    - "step by step"
  premium_min_chars: 400

budgets:
  default_daily_tokens: 20000

# Personas: role-based entitlements. Which Google account maps to which persona
# is deployment config (PERSONA_EMAILS env var), never committed to the repo.
personas:
  manager:
    label: Branch Manager
    daily_tokens: 50000
    allowed_tiers: [standard, premium]
    context: >-
      The user is a branch manager at a regulated retail bank. They ask
      operational, staffing, and strategy questions; keep answers practical.
  analyst:
    label: Data Analyst
    daily_tokens: 50000
    allowed_tiers: [standard, premium]
    context: >-
      The user is a data analyst at a regulated retail bank. Prefer precise,
      technical answers; include SQL or BigQuery examples when relevant.
  auditor:
    label: Compliance Auditor
    daily_tokens: 10000
    allowed_tiers: [standard]   # premium requests are clamped to standard
    context: >-
      The user is a compliance auditor. Answers should be conservative,
      reference controls and evidence, and avoid speculation.

pii:
  action: block          # block | redact
  screen_responses: true # also run the model's reply through the PII screen

context:
  history_max_tokens: 8000        # recent conversation sent with each request
  memory_max_items: 20            # long-term memories injected per request
  compact_trigger_tokens: 100000  # conversation size that triggers compaction
  keep_recent_messages: 10        # newest messages never compacted away
